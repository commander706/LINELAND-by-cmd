<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LINELAND</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .toggle-wrapper { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .toggle-wrapper input { display: none; }
        .toggle-switch { position: relative; width: 60px; height: 30px; background: #444; border-radius: 15px; transition: 0.3s; box-shadow: inset 0 0 5px rgba(0,0,0,0.5); }
        .toggle-switch::after { content: ''; position: absolute; top: 3px; left: 3px; width: 24px; height: 24px; background: #fff; border-radius: 50%; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .toggle-wrapper input:checked + .toggle-switch { background: #ff4d4d; box-shadow: 0 0 10px rgba(255, 77, 77, 0.5); }
        .toggle-wrapper input:checked + .toggle-switch::after { transform: translateX(30px); }

        #play-back-btn { background: linear-gradient(135deg, #555, #333); border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; }
        #play-back-btn:hover { background: linear-gradient(135deg, #ff4d4d, #cc0000); box-shadow: 0 5px 20px rgba(255,0,0,0.6); transform: translateY(-2px); }

        .ac-char {
            font-family: 'Arial Black', sans-serif;
            font-size: clamp(2rem, 5vw, 5rem);
            font-style: italic;
            font-weight: 900;
            background: linear-gradient(180deg, #ffffff 0%, #ffcc00 100%);
            -webkit-background-clip: text;
            color: transparent;
            filter: drop-shadow(0px 0px 10px rgba(255, 200, 0, 0.8));
            opacity: 0;
            transform: translateY(20px) scale(0.8);
        }
        .ac-char.show { animation: acPop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes acPop { to { opacity: 1; transform: translateY(0) scale(1); } }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="loading-screen" class="screen active">
            <div class="loader-container">
                <div class="loader-track">
                    <div class="loader-progress-line"></div>
                    <div class="loader-target-square"></div>
                </div>
                <div id="loader-circle" class="loader-circle"></div>
                <div id="loader-text" class="loader-text">0%</div>
            </div>
        </div>

        <div id="title-screen" class="screen">
            <div id="title-content" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                <svg id="title-svg" viewBox="0 0 1000 200">
                    <text x="50%" y="50%" dominant-baseline="central" text-anchor="middle" class="line-text">LINELAND</text>
                </svg>
                <div id="menu-buttons">
                    <button class="menu-btn" data-action="start">START</button>
                    <button class="menu-btn" data-action="editor">EDITOR</button>
                    <button class="menu-btn" data-action="setting">SETTING</button>
                </div>
                <div id="version-info">
                    LINELAND Version 1.0.5<br>
                    最新更新日:2026/04/17<br>
                    Remixed by 駒金
                </div>
            </div>
        </div>

        <div id="transition-wipe"></div>
        <div id="reset-wipe"></div>

        <div id="level-select-screen" class="screen">
            <canvas id="level-select-canvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5;"></canvas>
            
            <div id="level-select-ui" style="position: absolute; top: 10%; left: 5%; width: 90%; height: 80%; pointer-events: none; z-index: 10;">
                <div id="ls-info" style="position: absolute; left: max(20px, 12vw); top: 30%; opacity: 0; transition: opacity 0.3s; text-align: left;">
                    <h1 id="ls-title" style="font-size: clamp(2rem, 5vw, 4rem); font-style: italic; color: #fff; letter-spacing: 5px; margin-bottom: 10px; text-shadow: 0 0 10px rgba(0,0,0,0.8);"></h1>
                    <h3 id="ls-subtitle" style="font-size: clamp(1.2rem, 3vw, 2rem); color: #ffeb3b; margin-bottom: 15px; text-shadow: 0 0 10px rgba(0,0,0,0.8);"></h3>
                    <p id="ls-author" style="font-size: clamp(1rem, 2vw, 1.5rem); color: #ddd; text-shadow: 0 0 10px rgba(0,0,0,0.8);"></p>
                    <p id="ls-comment" style="font-size: clamp(0.9rem, 1.5vw, 1.2rem); color: #aaa; margin-top: 10px; max-width: 400px; text-shadow: 0 0 10px rgba(0,0,0,0.8); line-height: 1.4;"></p>
                    <p id="ls-time" style="font-size: clamp(1rem, 2vw, 1.5rem); color: #00ffcc; text-shadow: 0 0 10px rgba(0,0,0,0.8); margin-top: 15px;"></p>
                </div>
            </div>

            <button class="back-btn" data-action="back-from-start" style="position: absolute; bottom: 5vh; left: 50%; transform: translateX(-50%); z-index: 20;">BACK</button>
        </div>

        <div id="editor-select-screen" class="screen">
            <div class="editor-layout">
                <div class="editor-sidebar">
                    <h3 class="gradient-text">マイレベル</h3>
                    <div class="editor-controls">
                        <button id="new-level-btn" class="gradient-btn">新規作成 ＋</button>
                        <button id="import-level-btn" class="gradient-btn-secondary">インポート</button>
                        <input type="file" id="import-file-input" accept=".lila" style="display: none;">
                    </div>
                    <div id="custom-levels-list" class="list-container"></div>
                    <button class="back-btn" data-action="back-from-editor" style="margin-top: auto;">BACK</button>
                </div>

                <div id="level-details-panel" class="editor-main">
                    <div class="details-box">
                        <h2 id="detail-title" class="detail-title">タイトル</h2>
                        <h4 id="detail-subtitle" class="detail-subtitle">サブタイトル</h4>
                        <div class="detail-meta">
                            <p>作者: <span id="detail-author"></span></p>
                            <p>更新: <span id="detail-updated"></span></p>
                        </div>
                        <div class="detail-comment-box">
                            <p class="comment-label">作者からのコメント:</p>
                            <div id="detail-comment" class="comment-text"></div>
                        </div>
                        <div class="detail-actions">
                            <button id="btn-play" class="action-btn play">プレイ</button>
                            <button id="btn-edit" class="action-btn edit">編集</button>
                            <button id="btn-download" class="action-btn download">ダウンロード</button>
                            <button id="btn-delete" class="action-btn danger">削除</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="editor-screen" class="screen">
            <div class="editor-workspace">
                <div class="editor-preview-container">
                    <div class="editor-palette">
                        <div class="tool-item active" data-tool="empty">⬛ 空 (無)</div>
                        <div class="tool-item" data-tool="path">➖ 道</div>
                        <div class="tool-item" data-tool="player">🔴 プレイヤー</div>
                        <div class="tool-item" data-tool="goal">⬜ ゴール</div>
                        <div class="tool-item" data-tool="color_pass">◆ カラーパス</div>
                        <div class="tool-item" data-tool="color_socket">◎ ソケット</div>
                        <div class="tool-item" data-tool="vision_reverser">⭕ リバーサー</div>
                    </div>
                    <canvas id="editor-canvas"></canvas>
                </div>
                <div class="editor-tools">
                    <div class="editor-info-form">
                        <label>ステージ名</label>
                        <input type="text" id="edit-title">
                        <label>サブタイトル</label>
                        <input type="text" id="edit-subtitle">
                        <label>作者</label>
                        <input type="text" id="edit-author">
                        <label>作者からのコメント</label>
                        <textarea id="edit-comment"></textarea>
                    </div>
                    <div class="editor-tool-actions">
                        <button id="edit-save-btn" class="tool-btn save">セーブ</button>
                        <button id="edit-export-btn" class="tool-btn export">エクスポート</button>
                        <button id="edit-test-btn" class="tool-btn play">テストプレイ</button>
                        <button id="edit-back-btn" class="tool-btn back">戻る</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="play-screen" class="screen">
            <div style="position: absolute; top: 40px; left: 40px; z-index: 100;">
                <button id="play-back-btn" class="tool-btn back" style="padding: 12px 30px; font-size: 1.2rem;">戻る</button>
            </div>
            
            <div id="play-info-overlay" class="play-info-overlay">
                <h1 id="play-info-title" class="info-title"></h1>
                <h3 id="play-info-subtitle" class="info-subtitle"></h3>
                <p id="play-info-author" class="info-author"></p>
            </div>
            
            <div style="position: relative;">
                <canvas id="play-canvas"></canvas>
            </div>
            
            <div id="play-clear-overlay" class="clear-overlay">
                <div class="clear-text-container">
                    <span class="clear-char">S</span>
                    <span class="clear-char">T</span>
                    <span class="clear-char">A</span>
                    <span class="clear-char">G</span>
                    <span class="clear-char">E</span>
                    <span class="clear-char" style="width: clamp(10px, 3vw, 30px);"></span>
                    <span class="clear-char">C</span>
                    <span class="clear-char">L</span>
                    <span class="clear-char">E</span>
                    <span class="clear-char">A</span>
                    <span class="clear-char">R</span>
                </div>
                
                <div class="clear-btns" id="play-clear-buttons-test" style="display: none; gap: 20px;">
                    <button id="play-retry-btn-test" class="action-btn play">リトライ</button>
                    <button id="play-clear-edit-btn" class="action-btn edit">編集に戻る</button>
                </div>

                <div class="clear-btns" id="play-clear-buttons-normal" style="display: none; gap: 20px;">
                    <button id="play-retry-btn-normal" class="action-btn play">リトライ</button>
                    <button id="play-clear-back-btn" class="action-btn back" style="background: linear-gradient(135deg, #666, #333);">戻る</button>
                </div>
            </div>
        </div>

        <div id="all-clear-overlay" class="clear-overlay" style="z-index: 9999; background: rgba(0,0,0,0.9); flex-direction: column; display: none;">
            <div id="ac-congrats" style="display: flex; gap: clamp(2px, 1vw, 10px); margin-bottom: 30px;"></div>
            <div id="ac-message" style="color: white; font-size: clamp(1rem, 2vw, 2rem); font-family: monospace; min-height: 2em; text-align: center;"></div>
        </div>

        <div id="fake-loading-overlay" class="screen" style="z-index: 10000;">
            <div class="loader-container">
                <div class="loader-track">
                    <div class="loader-progress-line"></div>
                    <div class="loader-target-square"></div>
                </div>
                <div class="loader-circle"></div>
                <div class="loader-text">0%</div>
                <div style="position: absolute; top: 40px; width: 100%; text-align: center; color: #ff4d4d; font-size: 1.2rem; font-style: italic; letter-spacing: 3px;">LOADING...</div>
            </div>
        </div>

        <div id="color-context-menu" class="context-menu">
            <p style="color:#aaa; font-size:0.8rem; text-align:center; margin-bottom:5px;">Shift+クリックで混色</p>
            <div class="color-row">
                <div class="color-swatch" data-color="#ff0000" style="background: #ff0000;" title="赤"></div>
                <div class="color-swatch" data-color="#0000ff" style="background: #0000ff;" title="青"></div>
                <div class="color-swatch" data-color="#ffff00" style="background: #ffff00;" title="黄"></div>
                <div class="color-swatch" data-color="#00ff00" style="background: #00ff00;" title="緑"></div>
            </div>
            <div class="color-row">
                <div class="color-swatch" data-color="#800080" style="background: #800080;" title="紫"></div>
                <div class="color-swatch" data-color="#ffa500" style="background: #ffa500;" title="橙"></div>
                <div class="color-swatch" data-color="#00ffff" style="background: #00ffff;" title="シアン"></div>
                <div class="color-swatch" data-color="#ff00ff" style="background: #ff00ff;" title="マゼンタ"></div>
            </div>
            <div class="color-row">
                <div class="color-swatch" data-color="#ffffff" style="background: #ffffff; border: 1px solid #444;" title="白"></div>
                <div class="color-swatch" data-color="#333333" style="background: #333333; border: 1px solid #555;" title="無色"></div>
                <input type="color" id="custom-color-picker" class="color-swatch color-picker-input" value="#ff0000" title="カスタムカラー">
            </div>
            <div id="mixing-area" class="mixing-area">
                <div id="mixing-expression" class="mixing-expression"></div>
                <span style="color: white; font-weight: bold; font-size: 1.2rem;">=</span>
                <div id="mixing-result" class="color-swatch mixing-result" title="この色に決定"></div>
            </div>
            <div id="socket-id-container" style="display:none; margin-top:10px; border-top:1px solid #555; padding-top:10px;">
                <label style="color:#fff; font-size:0.8rem;">接続ソケットID</label>
                <input type="text" id="socket-id-input" placeholder="例: A, 1 など" style="width:100%; padding:5px; background:#111; color:#fff; border:1px solid #444; border-radius:4px; margin-top:5px; text-align:center;">
            </div>
        </div>

        <div id="new-level-modal" class="modal-overlay" style="z-index: 10001;">
            <div class="modal-content">
                <h3>新規レベル作成</h3>
                <input type="text" id="new-title" placeholder="レベルタイトル">
                <input type="text" id="new-subtitle" placeholder="サブタイトル">
                <input type="text" id="new-author" placeholder="作者">
                <div class="modal-buttons">
                    <button id="modal-create-btn" class="modal-btn confirm">作成</button>
                    <button id="modal-cancel-btn" class="modal-btn">キャンセル</button>
                </div>
            </div>
        </div>

        <div id="exit-confirm-modal" class="modal-overlay" style="z-index: 10002;">
            <div class="modal-content">
                <h3 style="font-size: 1.5rem; color: #fff; text-align: center; margin-bottom: 10px;">エディターを終了しますか？</h3>
                <div class="modal-buttons vertical">
                    <button id="exit-save-btn" class="modal-btn confirm">保存して終了</button>
                    <button id="exit-nosave-btn" class="modal-btn danger">保存せず終了</button>
                    <button id="exit-cancel-btn" class="modal-btn">キャンセル</button>
                </div>
            </div>
        </div>

        <div id="setting-modal" class="modal-overlay" style="z-index: 10003;">
            <div class="modal-content" style="width: 450px;">
                <h3 style="font-size: 2rem; font-style: italic; margin-bottom: 5px;">SETTING</h3>
                <div class="sliders-wrapper" style="margin-top: 10px;">
                    <div class="slider-container">
                        <div class="slider-label">BGM</div>
                        <div class="custom-slider" id="bgm-slider" data-value="50">
                            <div class="slider-track"></div><div class="slider-fill"></div><div class="slider-thumb"></div>
                        </div>
                    </div>
                    <div class="slider-container">
                        <div class="slider-label">SE</div>
                        <div class="custom-slider" id="se-slider" data-value="50">
                            <div class="slider-track"></div><div class="slider-fill"></div><div class="slider-thumb"></div>
                        </div>
                    </div>
                </div>
                <div style="display: flex; flex-direction: column; gap: 20px; margin-top: 25px;">
                    <label class="toggle-wrapper">
                        <span style="color: #fff; font-weight: bold; font-size: 1.1rem;">音楽による画面拡大</span>
                        <input type="checkbox" id="toggle-bg-scale" checked>
                        <div class="toggle-switch"></div>
                    </label>
                    <label class="toggle-wrapper">
                        <span style="color: #fff; font-weight: bold; font-size: 1.1rem;">音波の表示</span>
                        <input type="checkbox" id="toggle-bg-wave" checked>
                        <div class="toggle-switch"></div>
                    </label>
                </div>
                <div style="margin-top: 25px; text-align: center;">
                    <button id="clear-data-btn" class="modal-btn danger" style="padding: 12px 30px; font-size: 1rem;">クリア状況の削除</button>
                </div>
                <div class="modal-buttons" style="margin-top: 20px;">
                    <button id="setting-close-btn" class="modal-btn confirm">閉じる</button>
                </div>
            </div>
        </div>

        <div id="custom-confirm-modal" class="modal-overlay" style="z-index: 10005;">
            <div class="modal-content">
                <h3 id="confirm-msg" style="font-size: 1.2rem; line-height:1.5;">確認</h3>
                <div class="modal-buttons">
                    <button id="confirm-yes-btn" class="modal-btn confirm">はい</button>
                    <button id="confirm-no-btn" class="modal-btn danger">いいえ</button>
                </div>
            </div>
        </div>

        <div id="toast-message" style="z-index: 10010;"></div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
